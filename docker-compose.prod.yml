services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
      - apigateway
      - chatservice
      - mediaservice

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${DOMAIN}/api
        VITE_WS_API_URL: ${DOMAIN}
        VITE_MEDIA_SERVER_URL: https://${DOMAIN}
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
    restart: unless-stopped

  redis:
    image: redis:alpine
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=MeetingTimeDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=197314qqq
    volumes:
      - pg_data:/var/lib/postgresql/data

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - authservice
      - roomservice
      - chatservice
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341

  authservice:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
      - ConnectionStrings__DbConnection=Host=postgres;Port=5432;Database=MeetingTimeDb;Username=postgres;Password=197314qqq

  roomservice:
    build:
      context: .
      dockerfile: RoomService/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
      - ConnectionStrings__DbConnection=Host=postgres;Port=5432;Database=MeetingTimeDb;Username=postgres;Password=197314qqq

  chatservice:
    build:
      context: .
      dockerfile: ChatService/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
      - ConnectionStrings__DbConnection=Host=postgres;Port=5432;Database=MeetingTimeDb;Username=postgres;Password=197314qqq
      - Encryption__Key=${ENCRYPTION_KEY:-JBhvgkZlrD0kp+UpnsPSmR2tMPNHnPoc0aLFqp89gYo=}

  mediaservice:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=5000
      - WEBRTC_LISTEN_IP=0.0.0.0
      - WEBRTC_ANNOUNCED_IP=${GCP_STATIC_IP}
    # network_mode: host is used to avoid Docker NAT issues with Mediasoup's massive UDP port range.
    # Caddy will route to localhost:5000 directly.

volumes:
  caddy_data:
  caddy_config:
  pg_data:
