services:
  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8000:8080"
    depends_on:
      - authservice
      - roomservice
      - chatservice
      # - mediaservice
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  authservice:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    ports:
      - "8001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  roomservice:
    build:
      context: .
      dockerfile: RoomService/Dockerfile
    ports:
      - "8002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  chatservice:
    build:
      context: .
      dockerfile: ChatService/Dockerfile
    ports:
      - "8003:8080"
      - "8004:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  # mediaservice:
  #   build: ./MediaService
  #   ports: 
  #     - "3001:3001"