services:
  seq:
    image: datalust/seq:latest
    ports:
      - "5340:80"
      - "5341:5341"
    environment:
      - ACCEPT_EULA=Y
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8000:8080"
    depends_on:
      - authservice
      - roomservice
      - chatservice
      - redis
      - seq
      # - mediaservice
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
  authservice:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    ports:
      - "8001:8080"
    depends_on:
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
  roomservice:
    build:
      context: .
      dockerfile: RoomService/Dockerfile
    ports:
      - "8002:8080"
    depends_on:
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
  chatservice:
    build:
      context: .
      dockerfile: ChatService/Dockerfile
    ports:
      - "8003:8080"
      - "8004:8081"
    depends_on:
      - redis
      - seq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
      - Seq__Url=http://seq:5341
      - Encryption__Key=JBhvgkZlrD0kp+UpnsPSmR2tMPNHnPoc0aLFqp89gYo=
  # mediaservice:
  #   build: ./MediaService
  #   ports: 
  #     - "3001:3001"
  #     - "9229:9229"     # Node.js debugger port