syntax = "proto3";

option csharp_namespace = "Protos";

package room;

service Room {
	rpc CreateRoom (CreateRoomRequest) returns (RoomResponse);
	rpc GetRoom (GetRoomRequest) returns (RoomResponse);
	rpc GetRooms (Empty) returns (RoomsResponse);
	rpc UpdateRoom (UpdateRoomRequest) returns (RoomResponse);
	rpc DeleteRoom (DeleteRoomRequest) returns (Empty);
}

message CreateRoomRequest {
	string name = 1;
	int32 maxParticipiants = 2;
	string password = 3;
}

message GetRoomRequest {
	string roomId = 1;
}

message UpdateRoomRequest {
	string roomId = 1;
	string name = 2;
	int32 maxParticipiants = 3;
	string password = 4;
}

message DeleteRoomRequest {
	string roomId = 1;
}

message RoomResponse {
	string roomId = 1;
	string name = 2;
	int32 maxParticipiants = 3;
	string password = 4;
}

message RoomsResponse {
	repeated RoomResponse rooms = 1;
}

message Empty {}