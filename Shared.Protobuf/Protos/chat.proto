syntax = "proto3";

option csharp_namespace = "Protos";

package chat;

service Chat {
	rpc GetMessages (MessagesRequest) returns (MessagesResponse);
}

message MessagesRequest {
	string RoomId = 1;
}

message Message {
	string UserId = 1;
	string RoomId = 2;
	string Text = 3;
	int64 Timestamp = 4;
}

message MessagesResponse {
	repeated Message messages = 1;
}